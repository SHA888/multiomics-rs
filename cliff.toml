# git-cliff configuration for multiomics-rs
# Per-crate changelog

[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking -%}
            **(breaking)** {% endif -%}
            {{ commit.message | upper_first }}\
            {% if commit.scope %} ({{ commit.scope }}){% endif %}\
            {% if commit.breaking and commit.links %}\n    {% for link in commit.links %}
                {{ link }}{% endfor %}{% endif %}
    {% endfor %}
{% endfor %}

{% if github.contributors -%}
    ### Contributors
    {% for contributor in github.contributors %}
        - {{ contributor.name }} ({{ contributor.contributions }} contributions)
    {% endfor %}
{% endif -%}
"""
trim = true

[git]
conventional_commits = true
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
]
filter_commits = false
commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/SHA888/multiomics-rs/issues/${2}))" },
]
protect_breaking_commits = false
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "SHA888"
repo = "multiomics-rs"
