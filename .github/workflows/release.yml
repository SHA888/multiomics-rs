name: Release

on:
  push:
    tags:
      - '*-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract crate name and version
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          CRATE_NAME="${TAG%-*}"
          VERSION="${TAG#*-v}"
          echo "crate=$CRATE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ steps.extract.outputs.crate }} ${{ steps.extract.outputs.version }}
          draft: false
          prerelease: false

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: true
      - name: Extract crate name
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          CRATE_NAME="${TAG%-*}"
          echo "crate=$CRATE_NAME" >> $GITHUB_OUTPUT
      - name: Login to crates.io
        run: cargo login ${{ secrets.CRATES_IO_TOKEN }}
      - name: Publish ${{ steps.extract.outputs.crate }}
        run: cargo publish -p ${{ steps.extract.outputs.crate }} --all-features

  update-changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    needs: [create-release, publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff
      - name: Update changelog
        run: |
          git-cliff --latest --strip header
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md"
          git push
