repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: 'tests/fixtures/.*\.soft$'
      - id: end-of-file-fixer
        exclude: 'tests/fixtures/.*\.soft$'
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: false
        always_run: true

      - id: clippy
        name: clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        always_run: true

      - id: cargo-test
        name: cargo test
        entry: cargo nextest run --workspace
        language: system
        types: [rust]
        pass_filenames: false
        always_run: true

      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        files: '^Cargo\.lock$'
        pass_filenames: false
        always_run: true

      - id: cargo-deny
        name: cargo deny
        entry: cargo deny check
        language: system
        files: '^deny\.toml$'
        pass_filenames: false
        always_run: true
